<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Parcels — Client Access</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #1a1a2e; color: #eee; padding: 20px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 20px; color: #e2b96f; margin-bottom: 4px; }
  a.back { color: #9aa; font-size: 13px; text-decoration: none; }
  .panel { background: #16213e; border: 1px solid #0f3460; border-radius: 12px;
           padding: 18px; margin-top: 16px; }
  label { display: block; font-size: 13px; color: #9aa; margin-bottom: 4px; }
  input, select { padding: 10px 12px; border-radius: 8px; border: 1px solid #0f3460;
          background: #0f3460; color: #eee; font-size: 15px; outline: none; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .row > div { flex: 1; min-width: 140px; }
  button { padding: 10px 16px; border: none; border-radius: 8px; background: #e2b96f;
           color: #1a1a2e; font-weight: 700; cursor: pointer; font-size: 15px; }
  button.revoke { background: #c62828; color: #fff; padding: 6px 12px; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid #0f3460; }
  .link { font-family: monospace; color: #7fd1ff; word-break: break-all; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .ok { background: #14361c; color: #4caf50; }
  .dead { background: #3a1414; color: #ff9a9a; }
  .copy { background: #0f3460; color: #ccc; padding: 4px 10px; font-size: 12px; border-radius: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Client Access</h1>
  <a class="back" href="{{ url_for('home') }}">&larr; back to map</a> &nbsp;·&nbsp;
  <a class="back" href="{{ url_for('logout') }}">log out</a>

  <div class="panel">
    <form method="post" action="{{ url_for('admin_create') }}">
      <div class="row">
        <div>
          <label>Client name / label</label>
          <input type="text" name="label" placeholder="e.g. Acme Roofing" style="width:100%" />
        </div>
        <div>
          <label>Access lasts</label>
          <select name="days" style="width:100%">
            <option value="7">7 days</option>
            <option value="14">14 days</option>
            <option value="30" selected>30 days</option>
            <option value="90">90 days</option>
            <option value="never">No expiry</option>
          </select>
        </div>
        <div style="flex:0 0 auto"><button type="submit">Create link</button></div>
      </div>
    </form>
  </div>

  <div class="panel">
    <table>
      <thead><tr><th>Client</th><th>Link</th><th>Expires</th><th>Status</th><th></th></tr></thead>
      <tbody>
      {% for c in codes %}
        <tr>
          <td>{{ c.label }}</td>
          <td>
            <span class="link" id="lnk{{ loop.index }}">{{ host }}/enter/{{ c.code }}</span>
            <button type="button" class="copy" onclick="navigator.clipboard.writeText(document.getElementById('lnk{{ loop.index }}').textContent)">copy</button>
          </td>
          <td>{{ c.expires[:10] if c.expires else 'never' }}</td>
          <td>{% if c.active %}<span class="pill ok">active</span>{% else %}<span class="pill dead">expired</span>{% endif %}</td>
          <td>
            <form method="post" action="{{ url_for('admin_revoke') }}" style="margin:0">
              <input type="hidden" name="code" value="{{ c.code }}" />
              <button class="revoke" type="submit">revoke</button>
            </form>
          </td>
        </tr>
      {% else %}
        <tr><td colspan="5" style="color:#9aa">No client links yet — create one above.</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
