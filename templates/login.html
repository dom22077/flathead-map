<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flathead Valley Parcels — Sign in</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #1a1a2e; color: #eee; display: flex; align-items: center;
         justify-content: center; min-height: 100vh; padding: 20px; }
  .card { background: #16213e; border: 1px solid #0f3460; border-radius: 14px;
          padding: 28px 24px; width: 100%; max-width: 360px; text-align: center;
          box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  img { width: 72px; height: 72px; border-radius: 16px; margin-bottom: 14px; }
  h1 { font-size: 18px; color: #e2b96f; margin-bottom: 4px; }
  p.sub { font-size: 13px; color: #9aa; margin-bottom: 20px; }
  input { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid #0f3460;
          background: #0f3460; color: #eee; font-size: 16px; outline: none; margin-bottom: 12px; }
  input:focus { border-color: #e2b96f; }
  button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #e2b96f;
           color: #1a1a2e; font-size: 16px; font-weight: 700; cursor: pointer; }
  button:hover { background: #f0c97f; }
  .err { background: #4a1a1a; border: 1px solid #c62828; color: #ff9a9a; font-size: 13px;
         padding: 8px 10px; border-radius: 6px; margin-bottom: 14px; }
</style>
</head>
<body>
  <div class="card">
    <img src="{{ url_for('static', filename='icon.png') }}" alt="logo" />
    <h1>Flathead Valley Parcels</h1>
    <p class="sub">Enter your access code to view the map.</p>
    {% if expired %}<div class="err">That access link has expired. Contact Ponderosa for a new one.</div>{% endif %}
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}<div class="err">{{ msgs[0] }}</div>{% endif %}
    {% endwith %}
    <form method="post" action="{{ url_for('login') }}">
      <input type="password" name="access" placeholder="Access code" autocomplete="off" autofocus />
      <button type="submit">Open map</button>
    </form>
  </div>
</body>
</html>
